/* ==========================================================================
   COMMON FORM CONTROLS
========================================================================== */

input,

select,
button{

/******************************************************************************
------------------------------------------------------------------------------
BUTTON NORMALIZATION
------------------------------------------------------------------------------
CyberShield Assist
Version 1.0
------------------------------------------------------------------------------
Provides a consistent foundation for all buttons.
------------------------------------------------------------------------------
******************************************************************************/

/* ==========================================================================
   BUTTON FOUNDATION
========================================================================== */

button{

    appearance:none;
    -webkit-appearance:none;
    -moz-appearance:none;

    display:inline-flex;

    align-items:center;
    justify-content:center;

    position:relative;

    margin:0;
    padding:0;

    border:none;
    outline:none;

    background:transparent;

    color:inherit;

    font:inherit;

    line-height:1;

    text-decoration:none;

    white-space:nowrap;

    vertical-align:middle;

    cursor:pointer;

    user-select:none;

    overflow:hidden;

    transition:

        transform .25s ease,

        opacity .25s ease,

        background-color .25s ease,

        color .25s ease,

        border-color .25s ease,

        box-shadow .25s ease;

}

/* ==========================================================================
   HOVER
========================================================================== */

button:hover{

    transform:translateY(-1px);

}

/* ==========================================================================
   ACTIVE
========================================================================== */

    transform:scale(.98);

}

/* ==========================================================================
   FOCUS
========================================================================== */

button:focus{

    outline:none;

}

/* ==========================================================================
   DISABLED
========================================================================== */

    cursor:not-allowed;

    pointer-events:none;

========================================================================== */

    align-items:center;

========================================================================== */

========================================================================== */
