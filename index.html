<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber-Ops | Central Police Station</title>
    <style>
        /* Cyber-Hacker Styling */
        :root { --neon: #00f2ff; --bg: #0a0b10; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .container { width: 90%; max-width: 700px; padding: 20px; border: 1px solid var(--neon); background: rgba(0,0,0,0.8); box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }
        h1 { color: var(--neon); text-transform: uppercase; font-size: 1.2rem; border-bottom: 1px solid var(--neon); padding-bottom: 10px; }
        
        textarea { width: 100%; height: 120px; background: #000; color: var(--neon); border: 1px solid #333; padding: 10px; margin: 15px 0; }
        button { background: transparent; color: var(--neon); border: 1px solid var(--neon); padding: 10px 20px; cursor: pointer; text-transform: uppercase; }
        button:hover { background: var(--neon); color: #000; }
        
        .contact-block { margin-top: 30px; padding: 15px; border-top: 1px dashed var(--neon); font-size: 0.8rem; line-height: 1.6; }
        
        /* Print Styles */
        @media print {
            body { background: #fff; color: #000; }
            .container { border: none; box-shadow: none; }
            .no-print { display: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>[!] Cyber Incident Assessment Portal</h1>
    <p>Status: <strong>Awaiting Data Input</strong></p>
    
    <div id="app">
        <textarea id="userInput" placeholder="Describe the cyber incident..."></textarea>
        <button onclick="processInput()">[ ANALYZE THREAT ]</button>
    </div>

    <div class="contact-block">
        <strong>[OFFICIAL SUPPORT]</strong><br>
        Officer: <strong>Kipkoech Byegon</strong> (Attachment)<br>
        Central Police Station, Nairobi<br>
        <strong>Call/WhatsApp:</strong> +254 741 161199 / +254 701 711473<br>
        <em>Open for third-party training & security consultations.</em>
    </div>
</div>

<script>
    function processInput() {
        const text = document.getElementById('userInput').value;
        if(!text) { alert("Please provide details."); return; }
        
        // This is where you connect to Gemini API. 
        // For now, it logs to console.
        console.log("Analyzing:", text);
        alert("Data sent to analysis engine. Proceeding to diagnostics...");
    }
</script>

</body>
</html>
